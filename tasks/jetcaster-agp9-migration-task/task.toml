schema_version = "1.2"
artifacts = []

[task]
name = "jetbrains/jetcaster-agp9-migration-task"
description = "Evaluate agent ability to migrate the Jetcaster KMP project to AGP 9.0+"
authors = []
keywords = ["kotlin", "kmp", "android", "gradle", "agp", "migration", "jetcaster"]

[metadata]
instance_id = "jetcaster-agp9-migration-task"
difficulty = "hard"
category = "migration"
repo = "kotlin-hands-on/jetcaster-kmp-migration"
base_commit = "2f9ec2d1accdb26588093ceb743701f6c6734ee4"
url = "https://github.com/kotlin-hands-on/jetcaster-kmp-migration.git"

[verifier]
timeout_sec = 900

[verifier.env]
ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY}"

