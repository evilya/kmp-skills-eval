schema_version = "1.2"
artifacts = []

[task]
name = "jetbrains/kotlinconf-agp9-migration-task"
description = "Evaluate agent ability to migrate the KotlinConf KMP app to AGP 9.0+ and the new default KMP structure"
authors = []
keywords = ["kotlin", "kmp", "android", "gradle", "agp", "migration", "kotlinconf"]

[metadata]
instance_id = "kotlinconf-agp9-migration-task"
difficulty = "hard"
category = "migration"
repo = "JetBrains/kotlinconf-app"
base_commit = "4c5b079cc4df8205ab390036f45987e13ebac32c"
url = "https://github.com/JetBrains/kotlinconf-app.git"

[verifier]
timeout_sec = 900

[verifier.env]
ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY}"

[agent]
timeout_sec = 6000

[environment]
build_timeout_sec = 6000
os = "linux"
cpus = 4
memory_mb = 16384
storage_mb = 20480
gpus = 0
allow_internet = true
mcp_servers = []

[environment.env]
ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY}"

[solution.env]
